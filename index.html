<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POP生成ツール</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f7f3e8;
      color: #4a4032;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      background: #fffaf0;
      border: 1px solid #d8ccb0;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #6b5840;
    }
    p {
      margin: 0 0 24px;
      line-height: 1.7;
    }
    input[type="file"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d5c8aa;
      margin-bottom: 20px;
      box-sizing: border-box;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #B65341;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      background: #c7b2a6;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      background: #f3ede0;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.6;
      min-height: 24px;
    }
    .download {
      margin-top: 20px;
      display: none;
    }
    .download a {
      display: inline-block;
      background: #295E82;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>値札（POP）自動生成</h1>
    <p>CSVをアップロードすると、POP付きExcelを生成します。</p>

    <input type="file" id="csvFile" accept=".csv,text/csv">
    <button id="btn">生成する</button>

    <div class="status" id="status">CSVを選択してください</div>

    <div class="download" id="dlArea">
      <a id="dlLink" target="_blank" rel="noopener noreferrer">ダウンロード</a>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyP01PeKWD0jnI6_RvCW_7TqUbbPPmUNZ7Rrzqd-P9bE-iuOBLtNeuQK4W9D6x2amfT/exec";

    const btn = document.getElementById("btn");
    const status = document.getElementById("status");
    const dlArea = document.getElementById("dlArea");
    const dlLink = document.getElementById("dlLink");
    const csvFile = document.getElementById("csvFile");

    function setStatus(msg) {
      status.textContent = msg;
    }

    async function readCsvSmart(file) {
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
      const sjis = new TextDecoder("shift_jis", { fatal: false }).decode(bytes);

      const utf8Bad = (utf8.match(/�/g) || []).length;
      const sjisBad = (sjis.match(/�/g) || []).length;

      return sjisBad < utf8Bad ? sjis : utf8;
    }

    btn.addEventListener("click", async () => {
      try {
        dlArea.style.display = "none";
        dlLink.href = "";

        const file = csvFile.files[0];
        if (!file) {
          setStatus("CSVを選択してください");
          return;
        }

        btn.disabled = true;
        setStatus("CSVを読み込み中...");

        const csv = await readCsvSmart(file);

        setStatus("生成中...");

        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            fileName: file.name,
            csv: csv
          })
        });

        const text = await res.text();

        let json;
        try {
          json = JSON.parse(text);
        } catch (e) {
          throw new Error("GASの返答がJSONではありません。\n" + text);
        }

        if (!json.success) {
          throw new Error(json.error || "生成に失敗しました。");
        }

        if (!json.downloadUrl) {
          throw new Error("downloadUrl が返ってきていません。");
        }

        dlLink.href = json.downloadUrl;
        dlLink.download = json.fileName || "pop_output.xlsx";
        dlArea.style.display = "block";
        setStatus("完成しました");
      } catch (e) {
        setStatus("エラー:\n" + e.message);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
