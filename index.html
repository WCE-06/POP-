<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POP生成ツール</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f7f3e8;
      color: #4a4032;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      background: #fffaf0;
      border: 1px solid #d8ccb0;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #6b5840;
    }

    p {
      margin: 0 0 24px;
      line-height: 1.7;
    }

    .filebox {
      margin-bottom: 20px;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 1px solid #d5c8aa;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #b65341;
      color: white;
      width: 100%;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    button:disabled {
      background: #bca89d;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      background: #f3ede0;
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.6;
      min-height: 24px;
    }

    .download {
      margin-top: 20px;
      display: none;
    }

    .download a {
      display: inline-block;
      text-decoration: none;
      background: #295e82;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>値札（POP）自動生成</h1>
    <p>CSVをアップロードすると、POP付きのExcelファイルを作成します。</p>

    <div class="filebox">
      <input type="file" id="csvFile" accept=".csv,text/csv" />
    </div>

    <button id="uploadBtn">CSVをアップロードして生成</button>

    <div class="status" id="status">CSVファイルを選択してください。</div>

    <div class="download" id="downloadArea">
      <a id="downloadLink" href="#" target="_blank" rel="noopener noreferrer">Excelをダウンロード</a>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw8PImKcXJj6N5NK8YheP6Ka69b9yd8yJZHN9ZTQnKEGXlOZCcJL3SuOeJmE95Qs9U_og/exec";

    const fileInput = document.getElementById("csvFile");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusEl = document.getElementById("status");
    const downloadArea = document.getElementById("downloadArea");
    const downloadLink = document.getElementById("downloadLink");

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました。"));
        reader.readAsText(file, "UTF-8");
      });
    }

    uploadBtn.addEventListener("click", async () => {
      try {
        downloadArea.style.display = "none";
        downloadLink.href = "#";

        const file = fileInput.files[0];
        if (!file) {
          setStatus("先にCSVファイルを選択してください。");
          return;
        }

        uploadBtn.disabled = true;
        setStatus("CSVを読み込んでいます…");

        const csvText = await readFileAsText(file);

        setStatus("POPデータを生成しています…");

        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            fileName: file.name,
            csv: csvText
          })
        });

        const text = await response.text();

        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          throw new Error("GASからJSON形式で応答が返っていません。\n返答: " + text);
        }

        if (!result.success) {
          throw new Error(result.error || "POP生成に失敗しました。");
        }

        const url =
          result.downloadUrl ||
          (result.fileId
            ? `https://drive.google.com/uc?export=download&id=${result.fileId}`
            : "");

        if (!url) {
          throw new Error("ダウンロードURLが取得できませんでした。");
        }

        downloadLink.href = url;
        downloadLink.download = result.fileName || "pop_output.xlsx";
        downloadArea.style.display = "block";

        setStatus("生成が完了しました。下のボタンからExcelをダウンロードできます。");
      } catch (err) {
        setStatus("エラーが発生しました。\n" + err.message);
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
