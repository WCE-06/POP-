<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV → 値札Excel生成</title>
  <style>
    :root {
      --cream: #fff6de;
      --cream-dark: #f7e7bc;
      --line: #d9c79a;
      --text: #3d3527;
      --accent: #d94f30;
      --card: #fffdf7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(180deg, #fff8ea 0%, #fffdf7 100%);
      color: var(--text);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(80, 60, 20, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.3;
      color: var(--accent);
      font-weight: 800;
    }

    .lead {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.8;
      color: #5d5443;
    }

    .box {
      background: var(--cream);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
    }

    button {
      appearance: none;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(217, 79, 48, 0.22);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.8;
      color: #6a614f;
    }

    .note code {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2px 6px;
      word-break: break-all;
    }

    .progressWrap {
      display: none;
      margin-top: 18px;
    }

    .progressLabel {
      font-size: 13px;
      margin-bottom: 6px;
      color: #6a614f;
    }

    .progressOuter {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: #f1e7c9;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progressInner {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.2s ease;
    }

    .progressPercent {
      margin-top: 6px;
      font-size: 13px;
      color: #6a614f;
      text-align: right;
    }

    .result {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fffdf3;
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .result.error {
      background: #fff1ef;
      border-color: #efb7ac;
      color: #8a2d1f;
    }

    a {
      color: #1d5fbf;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>CSV → 値札Excel生成</h1>
      <p class="lead">
        CSVをアップロードすると、入力シート・POP大・POP中・POP小 を含むExcel用データを生成します。
      </p>

      <div class="box">
        <label class="label" for="csvFile">CSVファイルを選択</label>
        <input type="file" id="csvFile" accept=".csv,text/csv,.txt,text/plain">
      </div>

      <div class="box">
        <button id="submitBtn" type="button">生成する</button>
        <div class="note">
          1行目は見出しとして無視し、2行目以降を読み込みます。<br>
          <code>3列目=商品コード / 4列目=キャッチコピー / 5列目=商品名 / 6列目=商品単価</code><br>
          メイン価格は税抜、下段に税込価格、バーコードは画像表示です。
        </div>
      </div>

      <div id="progressWrap" class="progressWrap">
        <div class="progressLabel">生成中...</div>
        <div class="progressOuter">
          <div id="progressInner" class="progressInner"></div>
        </div>
        <div id="progressPercent" class="progressPercent">0%</div>
      </div>

      <div id="result" class="result"></div>
    </div>
  </div>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzSFKmX-7D4Bmc1vunK90sFnl3oCZ6broo2DARAltfNiElZq_psXSoqzmer_aT30UnmRQ/exec';

    const fileInput = document.getElementById('csvFile');
    const submitBtn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('result');
    const progressWrap = document.getElementById('progressWrap');
    const progressInner = document.getElementById('progressInner');
    const progressPercent = document.getElementById('progressPercent');

    let fakeProgressTimer = null;
    let currentProgress = 0;

    submitBtn.addEventListener('click', handleUpload);

    async function handleUpload() {
      resetResult();

      if (!fileInput.files || !fileInput.files.length) {
        showError('CSVファイルを選択してください。');
        return;
      }

      const file = fileInput.files[0];
      submitBtn.disabled = true;
      submitBtn.textContent = '生成中...';

      try {
        startProgress();

        const base64 = await fileToBase64WithProgress(file);
        setProgress(45);

        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            base64: base64,
            fileName: file.name,
            mimeType: file.type || 'text/csv'
          })
        });

        setProgress(85);

        const data = await response.json();

        if (!data.ok) {
          stopProgress();
          showError(data.message || '生成に失敗しました。');
          return;
        }

        setProgress(100);
        stopProgress(true);

        resultBox.style.display = 'block';
        resultBox.innerHTML =
          `生成完了

商品数: ${data.count}件

Google Sheets:
<a href="${data.sheetUrl}" target="_blank" rel="noopener noreferrer">${data.sheetUrl}</a>

Excel(.xlsx)ダウンロード:
<a href="${data.xlsxUrl}" target="_blank" rel="noopener noreferrer">${data.xlsxUrl}</a>`;
      } catch (error) {
        stopProgress();
        showError(error.message || '通信エラーが発生しました。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '生成する';
      }
    }

    function startProgress() {
      progressWrap.style.display = 'block';
      currentProgress = 0;
      setProgress(3);

      if (fakeProgressTimer) clearInterval(fakeProgressTimer);

      fakeProgressTimer = setInterval(() => {
        if (currentProgress < 90) {
          setProgress(currentProgress + 1);
        }
      }, 250);
    }

    function stopProgress(keepAt100 = false) {
      if (fakeProgressTimer) {
        clearInterval(fakeProgressTimer);
        fakeProgressTimer = null;
      }

      if (!keepAt100) {
        progressWrap.style.display = 'none';
      } else {
        setTimeout(() => {
          progressWrap.style.display = 'none';
        }, 600);
      }
    }

    function setProgress(value) {
      currentProgress = Math.max(0, Math.min(100, value));
      progressInner.style.width = `${currentProgress}%`;
      progressPercent.textContent = `${currentProgress}%`;
    }

    function resetResult() {
      resultBox.style.display = 'none';
      resultBox.className = 'result';
      resultBox.textContent = '';
      resultBox.innerHTML = '';
      progressWrap.style.display = 'none';
      setProgress(0);
      if (fakeProgressTimer) {
        clearInterval(fakeProgressTimer);
        fakeProgressTimer = null;
      }
    }

    function showError(message) {
      resultBox.style.display = 'block';
      resultBox.className = 'result error';
      resultBox.textContent = message;
    }

    function fileToBase64WithProgress(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onprogress = (event) => {
          if (event.lengthComputable) {
            const percent = Math.round((event.loaded / event.total) * 40);
            setProgress(Math.max(currentProgress, percent));
          }
        };

        reader.onload = () => {
          const dataUrl = String(reader.result || '');
          const parts = dataUrl.split(',');
          resolve(parts[1] || '');
        };

        reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました。'));
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
